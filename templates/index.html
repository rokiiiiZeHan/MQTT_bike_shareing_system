<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Shared Bike Tracker - Lingshui Li'an</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .side-panel {
      position: fixed;
      right: -400px;
      top: 50%;
      transform: translateY(-50%);
      width: 320px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 1000;
      transition: right 0.3s ease-in-out;
      overflow: hidden;
    }

    .side-panel.open {
      right: 20px;
    }

    .panel-header {
      display: none;  /* 隐藏头部 */
    }

    .panel-header h3 {
      margin: 0;
      font-size: 20px;
    }

    .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      padding: 0 8px;
      transition: transform 0.2s;
    }

    .close-btn:hover {
      transform: scale(1.2);
    }

    .panel-content {
      padding: 20px;
    }

    /* 单车信息卡片 */
    .bike-info-card {
      background: transparent;
      border-left: none;
      padding: 0;
      margin-bottom: 0;
    }

    .bike-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bike-status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: normal;
    }

    .status-available {
      background: #4CAF50;
      color: white;
    }

    .status-unavailable {
      background: #f44336;
      color: white;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .info-label {
      font-weight: bold;
      color: #666;
    }

    .info-value {
      color: #333;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-weight: 500;
      font-size:13px;
    }

    .battery-bar {
      background: #e0e0e0;
      border-radius: 10px;
      height: 20px;
      overflow: hidden;
      margin-top: 5px;
    }

    .battery-fill {
      background: #4CAF50;
      height: 100%;
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11px;
      font-weight: bold;
    }

    .battery-fill.low {
      background: #f44336;
    }

    .battery-fill.medium {
      background: #FF9800;
    }

    .location-link {
      color: #2196F3;
      text-decoration: none;
      cursor: pointer;
    }

    .location-link:hover {
      text-decoration: underline;
    }

    /* 遮罩层（点击面板外关闭） */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 999;
      display: none;
    }

    .overlay.show {
      display: block;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <div id="map"></div>

  <!-- 遮罩层 -->
  <div id="overlay" class="overlay"></div>

  <!-- 右侧悬浮窗 -->
  <div id="sidePanel" class="side-panel">
    <div class="panel-header">
      <h3>Bicycle Detailed Information</h3>
      <button class="close-btn" onclick="closePanel()">&times;</button>
    </div>
    <div id="panelContent" class="panel-content">
      <!-- 动态内容会在这里显示 -->
      <div style="text-align: center; color: #999; padding: 40px;">
        点击地图上的单车查看详情
      </div>
    </div>
  </div>

  <!-- Leaflet & Socket.IO -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <script>
    let map;
    let bikeMarkers = {};      // 存储所有单车标记 { bike_id: marker }
    let bikesData = {};        // 存储所有单车数据 { bike_id: bike_info }
    let legalZones = [];       // 存储合法区域数据（从后端获取）
    let currentSelectedBike = null;  // 当前选中的单车ID

    function initMap() {   //init map
      const centerLat = 18.402239;
      const centerLon = 110.014757;

      map = L.map('map').setView([centerLat, centerLon], 16);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
    }

    async function fetchAndDrawZones() {//异步执行函数
      try {
        const response = await fetch('/api/zones');
        const data = await response.json();
        legalZones = data.zones;//得到区域数组

        console.log('获取到合法区域:', legalZones);

        // 绘制每个合法区域
        legalZones.forEach(zone => {
          L.circle([zone.lat, zone.lon], {
            color: 'green',
            fillColor: '#3f3',
            fillOpacity: 0.2,
            radius: zone.radius_km * 1000,  // 转换为米
            weight: 2,
            opacity: 0.8
          }).addTo(map);
        });

      } catch (error) {
        console.error('Failed to obtain a valid region:', error);
      }
    }

    function createBikeIcon(bikeId) {       //车的图标
      return L.divIcon({
        className: 'custom-bike-icon',
        html: `
          <div style="position: relative; display: inline-block;">
            <img src="/static/bike.png" style="width: 40px; height: 40px;">
            <div style="
              position: absolute;
              bottom: -15px;
              left: 50%;
              transform: translateX(-50%);
              background: rgba(0,0,0,0.7);
              color: white;
              font-size: 10px;
              font-weight: bold;
              padding: 2px 5px;
              border-radius: 10px;
            ">
              ${bikeId}
            </div>
          </div>
        `,
        iconSize: [40, 40],
        iconAnchor: [20, 40],
        popupAnchor: [0, -40]
      });
    }

    function updateBikeMarker(bikeId, bikeData) {//判断是否是已有的车
      const icon = createBikeIcon(bikeId);

      if (bikeMarkers[bikeId]) {
        // 更新现有标记
        bikeMarkers[bikeId].setLatLng([bikeData.lat, bikeData.lon]);
      } else {
        // 创建新标记
        const marker = L.marker([bikeData.lat, bikeData.lon], { icon: icon }).addTo(map);

        // 添加点击事件
        marker.on('click', () => {
          showBikeDetails(bikeId);
        });

        bikeMarkers[bikeId] = marker;
      }
    }

    function showBikeDetails(bikeId) {//显示车辆详情
      const bike = bikesData[bikeId];
      if (!bike) return;

      currentSelectedBike = bikeId;

      // 判断单车是否可用（锁状态 + 故障判断）
      // 可用条件：unlocked 且 没有故障（目前所有车都无故障，所以只判断锁状态）
      const isAvailable = bike.lock === 'locked';
      const availableText = isAvailable ? 'Available' : 'Not available';
      const availableClass = isAvailable ? 'status-available' : 'status-unavailable';

      // 电池状态颜色
      let batteryClass = '';
      if (bike.battery < 20) batteryClass = 'low';
      else if (bike.battery < 50) batteryClass = 'medium';

      // 区域名称（如果没有则显示"不在任何区域"）
      const zoneName = bike.zone || 'No';
      const zoneStatus = bike.status === 'safe' ? 'Within legal parking areas' : 'Out of zone';

      // 构建悬浮窗内容
      const content = `
        <div class="bike-info-card">
          <div class="bike-title">
            Bike ${bike.bike_id}
            <span class="bike-status-badge ${availableClass}">${availableText}</span>
          </div>

          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value">${zoneStatus}</span>
          </div>

          <div class="info-row">
            <span class="info-label">Current Location</span>
            <span class="info-value">
              ${bike.lat.toFixed(6)}, ${bike.lon.toFixed(6)}
              <a href="javascript:void(0)" class="location-link" onclick="panToLocation(${bike.lat}, ${bike.lon})">
              </a>
            </span>
          </div>

          <div class="info-row">
            <span class="info-label">Parking Allowed</span>
            <span class="info-value">${zoneName}</span>
          </div>

          <div class="info-row">
            <span class="info-label">Battery level</span>
            <span class="info-value">${bike.battery}%</span>
          </div>
          <div class="battery-bar">
            <div class="battery-fill ${batteryClass}" style="width: ${bike.battery}%">
              ${bike.battery}%
            </div>
          </div>

          <div class="info-row">
            <span class="info-label">Lock Status</span>
            <span class="info-value">${bike.lock === 'unlocked' ? 'Unlocked' : 'locked'}</span>
          </div>

          <div class="info-row">
            <span class="info-label">Last updated</span>
            <span class="info-value">${new Date(bike.last_update).toLocaleTimeString()}</span>
          </div>

          <div class="info-row">
            <span class="info-label">Fault Status</span>
            <span class="info-value">No malfunctions</span>
          </div>
        </div>
      `;

      // 更新面板内容
      document.getElementById('panelContent').innerHTML = content;

      // 显示面板和遮罩
      document.getElementById('sidePanel').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    }

    function closePanel() {
      document.getElementById('sidePanel').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
      currentSelectedBike = null;
    }

    function panToLocation(lat, lon) {
      map.panTo([lat, lon], { animate: true, duration: 0.5 });
    }


    //初始化Socket.IO连接，接收实时数据
    function initSocket() {
      const socket = io();

      socket.on('connect', () => {
        console.log('Conectado ao Socket.IO');
      });

      socket.on('location_update', (data) => {
        console.log('Received bike update:', data);

        // 悬浮窗需要数据
        bikesData[data.bike_id] = {
          bike_id: data.bike_id,
          lat: data.lat,
          lon: data.lon,
          status: data.status,
          battery: data.battery,
          lock: data.lock,
          zone: data.zone,
          last_update: data.last_update
        };

        // 更新地图标记
        updateBikeMarker(data.bike_id, bikesData[data.bike_id]);

        //如果当前选中的单车被更新，刷新悬浮窗内容
        if (currentSelectedBike === data.bike_id) {
          showBikeDetails(data.bike_id);
        }
      });
    }

    //从后端获取初始单车数据
    async function fetchInitialBikes() {
      try {
        const response = await fetch('/api/bikes');
        const data = await response.json();

        console.log('Obtained the initial bicycle data:', data);

        for (const bike of data.bikes) {
          bikesData[bike.bike_id] = bike;
          updateBikeMarker(bike.bike_id, bike);
        }
      } catch (error) {
        console.error('Failed to obtain initial bicycle data:', error);
      }
    }

    //点击遮罩层关闭面板
    document.getElementById('overlay').addEventListener('click', closePanel);

    async function init() {
      initMap();
      await fetchAndDrawZones();
      await fetchInitialBikes();
      initSocket();
    }

    init();
  </script>
</body>
</html>
